<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Tugas Harianku</title>
<style>
  :root {
    --c1: #7F77DD; --c1l: #EEEDFE; --c1d: #3C3489;
    --c2: #1D9E75; --c2l: #E1F5EE;
    --c3: #D85A30; --c3l: #FAECE7;
    --c5: #BA7517; --c5l: #FAEEDA; --c5d: #633806;
    --star: #EF9F27;
    --bg: #f5f5f0; --card: #ffffff;
    --text: #1a1a1a; --text2: #666; --text3: #aaa;
    --border: #e0e0e0; --border2: #ccc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  #app { max-width: 430px; margin: 0 auto; background: var(--bg); min-height: 100vh; }
  .top-bar { background: var(--c1); color: white; padding: 16px 16px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .top-bar h1 { font-size: 18px; font-weight: 600; }
  .star-count { display: flex; align-items: center; gap: 6px; font-size: 16px; font-weight: 600; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; }
  .date-bar { background: var(--c1l); color: var(--c1d); text-align: center; padding: 8px 16px; font-size: 13px; font-weight: 600; }
  .sync-bar { background: #fffbe6; color: #7a5c00; text-align: center; padding: 5px; font-size: 12px; display: none; }
  .period-block { margin: 12px 12px 0; }
  .period-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 14px 14px 0 0; color: white; font-weight: 600; font-size: 15px; cursor: pointer; user-select: none; }
  .period-header .ph-progress { margin-left: auto; font-size: 12px; opacity: 0.9; background: rgba(255,255,255,0.25); padding: 2px 10px; border-radius: 12px; }
  .progress-bar-wrap { height: 5px; background: rgba(0,0,0,0.08); }
  .progress-bar { height: 5px; transition: width 0.4s ease; }
  .period-tasks { background: var(--card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 14px 14px; overflow: hidden; }
  .task-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
  .task-item:last-child { border-bottom: none; }
  .task-item:active { background: #f9f9f9; }
  .task-item.done .task-label { text-decoration: line-through; color: var(--text3); }
  .task-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px; transition: all 0.2s; color: white; }
  .task-item.done .task-check { border-color: transparent; }
  .task-label { font-size: 15px; flex: 1; line-height: 1.4; }
  .task-pts { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .task-item.done .task-pts { color: var(--star); font-weight: 700; }
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 430px; max-width: 100%; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 10; padding-bottom: env(safe-area-inset-bottom,0); }
  .nav-btn { flex: 1; padding: 10px 4px 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; color: var(--text3); cursor: pointer; border: none; background: transparent; font-family: inherit; -webkit-tap-highlight-color: transparent; }
  .nav-btn.active { color: var(--c1); }
  .nav-icon { font-size: 22px; }
  .screen { display: none; padding-bottom: 80px; }
  .screen.active { display: block; }
  .card { margin: 12px 12px 0; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .stat-box { background: var(--bg); border-radius: 10px; padding: 12px; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 700; }
  .stat-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .streak-box { background: var(--c5l); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
  .streak-num { font-size: 36px; font-weight: 700; color: var(--c5d); }
  .streak-txt { font-size: 13px; color: var(--c5d); line-height: 1.5; }
  .month-label { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 0 6px; }
  .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .history-item:last-child { border-bottom: none; }
  .hist-date { color: var(--text2); }
  .hist-stars { color: var(--star); font-weight: 700; }
  .hist-bar { height: 4px; background: var(--c1l); border-radius: 2px; margin-top: 2px; margin-bottom: 6px; }
  .hist-bar-fill { height: 4px; background: var(--c1); border-radius: 2px; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .filter-btn { font-size: 12px; padding: 5px 14px; border-radius: 16px; border: 1px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; font-family: inherit; }
  .filter-btn.active { background: var(--c1); color: white; border-color: var(--c1); }
  .admin-wrap { padding: 12px 12px 100px; }
  .period-admin { margin-bottom: 12px; background: var(--card); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  .period-admin-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; color: white; font-weight: 600; font-size: 14px; }
  .admin-task-row { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .admin-task-row input[type=text] { flex: 1; font-size: 14px; border: none; outline: none; background: transparent; color: var(--text); font-family: inherit; }
  .pts-input { width: 46px; font-size: 14px; text-align: center; border: 1px solid var(--border2); border-radius: 8px; padding: 4px; background: var(--bg); color: var(--text); font-family: inherit; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; padding: 0 4px; line-height: 1; }
  .add-task-btn { font-size: 14px; color: var(--c1); background: none; border: none; cursor: pointer; padding: 12px 16px; display: flex; align-items: center; gap: 6px; font-family: inherit; font-weight: 600; }
  .alarm-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .alarm-row:last-child { border-bottom: none; }
  .alarm-time-input { font-size: 14px; border: 1px solid var(--border2); border-radius: 8px; padding: 4px 8px; background: var(--bg); color: var(--text); font-family: inherit; }
  .text-input { font-size: 15px; width: 100%; border: none; border-bottom: 2px solid var(--border); padding: 6px 0; background: transparent; color: var(--text); outline: none; font-family: inherit; }
  .text-input:focus { border-bottom-color: var(--c1); }
  .save-btn { width: 100%; padding: 14px; background: var(--c1); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 16px; }
  .danger-btn { width: 100%; padding: 12px; background: var(--c3l); color: var(--c3); border: 1px solid var(--c3); border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 10px; }
  #pin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--card); z-index: 500; display: none; overflow-y: auto; }
  .pin-screen { display: flex; flex-direction: column; align-items: center; padding: 60px 24px 40px; max-width: 430px; margin: 0 auto; }
  .pin-screen h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .pin-screen p { font-size: 15px; color: var(--text2); margin-bottom: 36px; text-align: center; }
  .pin-dots { display: flex; gap: 18px; margin-bottom: 40px; }
  .pin-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border2); background: transparent; transition: all 0.15s; }
  .pin-dot.filled { background: var(--c1); border-color: var(--c1); transform: scale(1.1); }
  .pin-pad { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; width: 260px; }
  .pin-key { height: 64px; border-radius: 32px; border: 1.5px solid var(--border2); background: var(--card); font-size: 22px; font-weight: 500; cursor: pointer; color: var(--text); font-family: inherit; }
  .pin-key:active { background: var(--bg); transform: scale(0.95); }
  .pin-key.text-key { font-size: 14px; }
  .pin-error { color: #E24B4A; font-size: 14px; margin-top: 16px; height: 20px; }
  #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--card); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--c1l); border-top-color: var(--c1); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: rgba(30,30,30,0.9); color: white; padding: 10px 22px; border-radius: 24px; font-size: 15px; font-weight: 600; z-index: 998; display: none; white-space: nowrap; }
  @keyframes popIn { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
  .task-item.done .task-check { animation: popIn 0.25s ease; }
  .empty-period { padding: 16px; color: var(--text3); font-size: 14px; text-align: center; }
</style>
</head>
<body>
<div id="loading-screen">
  <div style="font-size:48px;">📋</div>
  <div class="spinner"></div>
  <div style="font-size:14px;color:#666;">Memuat data...</div>
</div>

<div id="app" style="display:none;">
  <div class="toast" id="toast"></div>
  <div class="sync-bar" id="sync-bar">⟳ Menyinkronkan...</div>

  <div id="pin-overlay">
    <div class="pin-screen">
      <div style="font-size:52px;margin-bottom:16px;">🔒</div>
      <h2>Halaman Admin</h2>
      <p>Masukkan PIN 4 digit untuk masuk</p>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-key" onclick="pinPress('1')">1</button>
        <button class="pin-key" onclick="pinPress('2')">2</button>
        <button class="pin-key" onclick="pinPress('3')">3</button>
        <button class="pin-key" onclick="pinPress('4')">4</button>
        <button class="pin-key" onclick="pinPress('5')">5</button>
        <button class="pin-key" onclick="pinPress('6')">6</button>
        <button class="pin-key" onclick="pinPress('7')">7</button>
        <button class="pin-key" onclick="pinPress('8')">8</button>
        <button class="pin-key" onclick="pinPress('9')">9</button>
        <button class="pin-key text-key" onclick="pinCancel()">Batal</button>
        <button class="pin-key" onclick="pinPress('0')">0</button>
        <button class="pin-key text-key" onclick="pinClear()">⌫</button>
      </div>
      <div class="pin-error" id="pin-error"></div>
    </div>
  </div>

  <div id="screen-home" class="screen active">
    <div class="top-bar">
      <h1 id="greeting">Hai! 👋</h1>
      <div class="star-count">⭐ <span id="star-display">0</span></div>
    </div>
    <div class="date-bar" id="date-bar"></div>
    <div id="periods-container"></div>
  </div>

  <div id="screen-summary" class="screen">
    <div class="top-bar"><h1>Pencapaian ⭐</h1></div>
    <div class="card">
      <h2>Hari ini</h2>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-val" id="s-done">0</div><div class="stat-lbl">tugas selesai</div></div>
        <div class="stat-box"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">total tugas</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--star)" id="s-stars">0 ⭐</div><div class="stat-lbl">bintang hari ini</div></div>
        <div class="stat-box"><div class="stat-val" id="s-pct">0%</div><div class="stat-lbl">selesai</div></div>
      </div>
      <div class="streak-box">
        <div class="streak-num" id="s-streak">0</div>
        <div class="streak-txt">hari berturut-turut<br>semua tugas selesai 🔥</div>
      </div>
    </div>
    <div class="card">
      <h2>Total bintang terkumpul</h2>
      <div style="font-size:36px;font-weight:700;color:var(--star);text-align:center;padding:8px 0;" id="s-total-stars">0 ⭐</div>
    </div>
    <div class="card">
      <h2>Riwayat</h2>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setHistFilter(7,this)">7 Hari</button>
        <button class="filter-btn" onclick="setHistFilter(30,this)">30 Hari</button>
        <button class="filter-btn" onclick="setHistFilter(0,this)">Semua</button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <div id="screen-admin" class="screen">
    <div class="top-bar"><h1>⚙️ Admin</h1></div>
    <div class="admin-wrap" id="admin-content"></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="switchScreen('home')">
      <span class="nav-icon">📋</span><span>Tugas</span>
    </button>
    <button class="nav-btn" id="nav-summary" onclick="switchScreen('summary')">
      <span class="nav-icon">⭐</span><span>Pencapaian</span>
    </button>
    <button class="nav-btn" id="nav-admin" onclick="adminClick()">
      <span class="nav-icon">⚙️</span><span>Admin</span>
    </button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNl13HGuohUtSWHrKN7twFYhS0XqpeTiM",
  authDomain: "kid-s-app-fec65.firebaseapp.com",
  projectId: "kid-s-app-fec65",
  storageBucket: "kid-s-app-fec65.firebasestorage.app",
  messagingSenderId: "729382000572",
  appId: "1:729382000572:web:2333d8866fc608ed2b7db9"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

const COLORS = ['#7F77DD','#1D9E75','#D85A30','#D4537E','#BA7517'];

const DEFAULT_CONFIG = {
  pin: '1234', childName: 'Adik',
  periods: [
    { id:'pagi', label:'Pagi - Bangun Tidur', icon:'🌅', alarm:'06:00',
      tasks: [{id:1,label:'Bangun & rapikan tempat tidur',pts:2},{id:2,label:'Cuci muka & gosok gigi',pts:2},{id:3,label:'Ganti baju',pts:1},{id:4,label:'Berdoa pagi',pts:2}]},
    { id:'sekolah', label:'Sebelum Sekolah', icon:'🎒', alarm:'06:45',
      tasks: [{id:5,label:'Sarapan',pts:2},{id:6,label:'Cek tas & perlengkapan sekolah',pts:1},{id:7,label:'Pamit dengan sopan',pts:2}]},
    { id:'pulang', label:'Pulang Sekolah', icon:'🏠', alarm:'13:00',
      tasks: [{id:8,label:'Ganti baju rumah',pts:1},{id:9,label:'Cuci tangan & kaki',pts:2},{id:10,label:'Makan siang',pts:2},{id:11,label:'Istirahat siang',pts:1}]},
    { id:'sore', label:'Sore Hari', icon:'⛅', alarm:'15:30',
      tasks: [{id:12,label:'Mengerjakan PR',pts:3},{id:13,label:'Belajar mandiri 15 menit',pts:3},{id:14,label:'Waktu bermain',pts:1}]},
    { id:'malam', label:'Malam - Sebelum Tidur', icon:'🌙', alarm:'20:00',
      tasks: [{id:15,label:'Mandi malam',pts:2},{id:16,label:'Makan malam',pts:1},{id:17,label:'Siapkan tas & baju besok',pts:2},{id:18,label:'Gosok gigi malam',pts:2},{id:19,label:'Berdoa & tidur tepat waktu',pts:3}]}
  ]
};

let config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
let todayData = {};
let historyCache = [];
let histFilter = 7;
let adminUnlocked = false;
let pinBuffer = '';
let alarmTimers = [];
let userId = null;

function todayKey() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function allTasks() { return config.periods.flatMap(p=>p.tasks); }
function todayStars() { return Object.values(todayData).reduce((a,v)=>a+(typeof v==='number'?v:0),0); }
function totalStarsAll() {
  const histSum = historyCache.filter(h=>h.date!==todayKey()).reduce((s,h)=>s+Object.values(h.data).reduce((a,v)=>a+(typeof v==='number'?v:0),0),0);
  return histSum + todayStars();
}

async function loadFromFirestore() {
  const cfgDoc = await getDoc(doc(db,'users',userId,'data','config'));
  if (cfgDoc.exists()) config = cfgDoc.data();
  const todayDoc = await getDoc(doc(db,'users',userId,'days',todayKey()));
  if (todayDoc.exists()) todayData = todayDoc.data();
  await loadHistory(0);
}

async function saveConfigFS() {
  showSync();
  try { await setDoc(doc(db,'users',userId,'data','config'), config); } catch(e){}
  hideSync();
}

async function saveTodayFS() {
  showSync();
  try { await setDoc(doc(db,'users',userId,'days',todayKey()), todayData); } catch(e){}
  hideSync();
}

async function loadHistory(filterDays) {
  try {
    const col = collection(db,'users',userId,'days');
    const q = filterDays>0 ? query(col,orderBy('__name__','desc'),limit(filterDays)) : query(col,orderBy('__name__','desc'));
    const snap = await getDocs(q);
    historyCache = [];
    snap.forEach(d => historyCache.push({date:d.id, data:d.data()}));
    historyCache.sort((a,b)=>b.date.localeCompare(a.date));
  } catch(e) { console.error(e); }
}

function showSync() { document.getElementById('sync-bar').style.display='block'; }
function hideSync() { document.getElementById('sync-bar').style.display='none'; }

function renderHome() {
  const h = new Date().getHours();
  const gr = h<11?'Selamat pagi':h<15?'Selamat siang':h<18?'Selamat sore':'Selamat malam';
  document.getElementById('greeting').textContent = gr+', '+(config.childName||'Adik')+'! 👋';
  document.getElementById('star-display').textContent = totalStarsAll();
  document.getElementById('date-bar').textContent = formatDate(new Date());
  const cont = document.getElementById('periods-container');
  cont.innerHTML = '';
  config.periods.forEach((p,pi)=>{
    const color = COLORS[pi%COLORS.length];
    const done = p.tasks.filter(t=>todayData[t.id]).length;
    const total = p.tasks.length;
    const pct = total?Math.round(done/total*100):0;
    const collapsed = sessionStorage.getItem('col_'+p.id)==='1';
    const tasksHtml = p.tasks.length===0
      ? '<div class="empty-period">Belum ada tugas</div>'
      : p.tasks.map(t=>`
        <div class="task-item ${todayData[t.id]?'done':''}" onclick="toggleTask(${t.id},${pi})">
          <div class="task-check" style="${todayData[t.id]?'background:'+color+';border-color:'+color:''}">
            ${todayData[t.id]?'✓':''}
          </div>
          <span class="task-label">${t.label}</span>
          <span class="task-pts">${todayData[t.id]?'+':''}${t.pts} ⭐</span>
        </div>`).join('');
    const block = document.createElement('div');
    block.className = 'period-block';
    block.innerHTML = `
      <div class="period-header" style="background:${color}" onclick="togglePeriod('${p.id}')">
        <span>${p.icon}</span><span>${p.label}</span>
        <span class="ph-progress">${done}/${total} ${collapsed?'▼':'▲'}</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="period-tasks" id="pt-${p.id}" style="display:${collapsed?'none':'block'}">${tasksHtml}</div>`;
    cont.appendChild(block);
  });
}

window.togglePeriod = function(id) {
  const cur = sessionStorage.getItem('col_'+id)==='1';
  sessionStorage.setItem('col_'+id,cur?'0':'1');
  renderHome();
};

window.toggleTask = function(id, pi) {
  const t = config.periods[pi].tasks.find(x=>x.id===id);
  if (!t) return;
  if (todayData[id]) { delete todayData[id]; showToast('-'+t.pts+' ⭐ dibatalkan'); }
  else { todayData[id]=t.pts; showToast('+'+t.pts+' bintang! ⭐'); playDing(); }
  saveTodayFS();
  const idx = historyCache.findIndex(h=>h.date===todayKey());
  if (idx>=0) historyCache[idx].data={...todayData};
  else historyCache.unshift({date:todayKey(),data:{...todayData}});
  renderHome();
  if (allTasks().length>0 && allTasks().every(t2=>todayData[t2.id]))
    setTimeout(()=>showToast('🎉 Semua tugas selesai! Luar biasa!'),400);
};

function renderSummary() {
  const all = allTasks();
  const done = all.filter(t=>todayData[t.id]).length;
  const pct = all.length?Math.round(done/all.length*100):0;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-total').textContent = all.length;
  document.getElementById('s-stars').textContent = todayStars()+' ⭐';
  document.getElementById('s-pct').textContent = pct+'%';
  document.getElementById('s-total-stars').textContent = totalStarsAll()+' ⭐';
  document.getElementById('s-streak').textContent = calcStreak();
  renderHistory();
}

function renderHistory() {
  const hl = document.getElementById('history-list');
  hl.innerHTML = '';
  const all = allTasks();
  let data = histFilter>0 ? historyCache.slice(0,histFilter) : historyCache;
  if (!data.length) {
    hl.innerHTML = '<div style="color:var(--text3);font-size:14px;text-align:center;padding:16px;">Belum ada riwayat</div>';
    return;
  }
  let curMonth='';
  data.forEach(h=>{
    const date = new Date(h.date+'T00:00:00');
    const month = date.toLocaleDateString('id-ID',{month:'long',year:'numeric'});
    if (month!==curMonth) {
      curMonth=month;
      const ml=document.createElement('div');
      ml.className='month-label'; ml.textContent=month;
      hl.appendChild(ml);
    }
    const starsH=Object.values(h.data).reduce((a,v)=>a+(typeof v==='number'?v:0),0);
    const doneH=all.filter(t=>h.data[t.id]).length;
    const pctH=all.length?Math.round(doneH/all.length*100):0;
    const isToday=h.date===todayKey();
    const row=document.createElement('div');
    row.innerHTML=`
      <div class="history-item">
        <span class="hist-date">${formatDateShort(date)}${isToday?' <b style="color:var(--c1)">(hari ini)</b>':''}</span>
        <span>${doneH}/${all.length} &nbsp;<span class="hist-stars">${starsH}⭐</span></span>
      </div>
      <div class="hist-bar"><div class="hist-bar-fill" style="width:${pctH}%"></div></div>`;
    hl.appendChild(row);
  });
}

window.setHistFilter = async function(n, btn) {
  histFilter=n;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (n===0) await loadHistory(0);
  renderHistory();
  document.getElementById('s-total-stars').textContent=totalStarsAll()+' ⭐';
};

function calcStreak() {
  const all=allTasks(); if (!all.length) return 0;
  let streak=0;
  for (let i=0;i<365;i++) {
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const h=historyCache.find(x=>x.date===k);
    if (h&&all.every(t=>h.data[t.id])) streak++;
    else if (i>0) break;
  }
  return streak;
}

function renderAdmin() {
  const cont=document.getElementById('admin-content');
  let html=`
    <div class="card" style="margin:0 0 12px;">
      <h2>Nama Anak</h2>
      <input type="text" id="childNameInput" class="text-input" value="${config.childName||'Adik'}" placeholder="Nama anak">
    </div>
    <div class="card" style="margin:0 0 12px;">
      <h2>Alarm per Periode</h2>
      ${config.periods.map((p,pi)=>`
        <div class="alarm-row">
          <span>${p.icon} ${p.label.split(' - ')[0]}</span>
          <input type="time" class="alarm-time-input" value="${p.alarm||''}" id="alarm-${pi}">
        </div>`).join('')}
    </div>
    <div class="card" style="margin:0 0 12px;">
      <h2>Ganti PIN Admin</h2>
      <input type="number" id="newPinInput" class="text-input" placeholder="PIN baru (4 angka)">
    </div>`;
  config.periods.forEach((p,pi)=>{
    const color=COLORS[pi%COLORS.length];
    html+=`
      <div class="period-admin">
        <div class="period-admin-header" style="background:${color}">
          <span>${p.icon}</span><span>${p.label}</span>
        </div>
        <div id="atasks-${pi}">
          ${p.tasks.map((t,ti)=>`
            <div class="admin-task-row">
              <input type="text" value="${t.label}"
                onchange="config.periods[${pi}].tasks[${ti}].label=this.value"
                style="flex:1;font-size:14px;border:none;outline:none;background:transparent;color:var(--text);font-family:inherit;">
              <span style="font-size:12px;color:var(--text3);">pts:</span>
              <input type="number" class="pts-input" value="${t.pts}" min="1" max="10"
                onchange="config.periods[${pi}].tasks[${ti}].pts=parseInt(this.value)||1">
              <button class="del-btn" onclick="delTask(${pi},${ti})">✕</button>
            </div>`).join('')}
        </div>
        <button class="add-task-btn" onclick="addTask(${pi})">＋ Tambah tugas</button>
      </div>`;
  });
  html+=`
    <button class="save-btn" onclick="saveAdmin()">💾 Simpan Semua Perubahan</button>
    <button class="danger-btn" onclick="resetToday()">🔄 Reset Checklist Hari Ini</button>
    <div style="height:20px;"></div>`;

window.delTask=function(pi,ti){
  if(!confirm('Hapus tugas ini?'))return;
  config.periods[pi].tasks.splice(ti,1); renderAdmin();
};
window.addTask=function(pi){
  config.periods[pi].tasks.push({id:Date.now(),label:'Tugas baru',pts:1});
  renderAdmin();
  setTimeout(()=>{
    const rows=document.querySelectorAll(`#atasks-${pi} .admin-task-row input[type=text]`);
    if(rows.length){rows[rows.length-1].focus();rows[rows.length-1].select();}
  },50);
};
window.saveAdmin=async function(){
  config.childName=document.getElementById('childNameInput').value.trim()||'Adik';
  config.periods.forEach((p,pi)=>{const el=document.getElementById('alarm-'+pi);if(el)p.alarm=el.value;});
  const np=document.getElementById('newPinInput').value.trim();
  if(np&&/^\d{4}$/.test(np))config.pin=np;
  await saveConfigFS();
  scheduleAlarms();
  showToast('✓ Tersimpan!');
  setTimeout(()=>switchScreen('home'),500);
};
window.resetToday=async function(){
  if(!confirm('Reset semua centang hari ini?'))return;
  todayData={};
  await saveTodayFS();
  const idx=historyCache.findIndex(h=>h.date===todayKey());
  if(idx>=0)historyCache.splice(idx,1);
  showToast('Checklist direset');
  renderHome();
};

window.switchScreen=function(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='home')renderHome();
  if(name==='summary')renderSummary();
  if(name==='admin')renderAdmin();
};

window.adminClick=function(){
  if(adminUnlocked){switchScreen('admin');return;}
  pinBuffer='';updatePinDots();
  document.getElementById('pin-error').textContent='';
  document.getElementById('pin-overlay').style.display='block';
};

window.pinPress=function(n){
  if(pinBuffer.length>=4)return;
  pinBuffer+=n;updatePinDots();
  if(pinBuffer.length===4){
    setTimeout(()=>{
      if(pinBuffer===config.pin){
        document.getElementById('pin-overlay').style.display='none';
        adminUnlocked=true;pinBuffer='';updatePinDots();switchScreen('admin');
      } else {
        document.getElementById('pin-error').textContent='PIN salah, coba lagi';
        pinBuffer='';updatePinDots();
        setTimeout(()=>document.getElementById('pin-error').textContent='',1800);
      }
    },150);
  }
};
window.pinClear=function(){if(pinBuffer.length){pinBuffer=pinBuffer.slice(0,-1);updatePinDots();}};
window.pinCancel=function(){document.getElementById('pin-overlay').style.display='none';pinBuffer='';updatePinDots();};
function updatePinDots(){
  for(let i=0;i<4;i++){const d=document.getElementById('d'+i);if(d)d.className='pin-dot'+(i<pinBuffer.length?' filled':'');}
}

function scheduleAlarms(){
  alarmTimers.forEach(t=>clearTimeout(t));alarmTimers=[];
  if(!('Notification'in window))return;
  config.periods.forEach(p=>{
    if(!p.alarm)return;
    const[hh,mm]=p.alarm.split(':').map(Number);
    const now=new Date(),target=new Date();
    target.setHours(hh,mm,0,0);
    if(target<=now)target.setDate(target.getDate()+1);
    const tid=setTimeout(()=>{
      if(Notification.permission==='granted')
        new Notification('Waktunya '+p.label+'! '+p.icon,{body:'Yuk cek tugasmu, '+(config.childName||'Adik')+'!'});
      playAlarm();scheduleAlarms();
    },target-now);
    alarmTimers.push(tid);
  });
}

function playDing(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784].forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type='sine';
      g.gain.setValueAtTime(0.25,ctx.currentTime+i*0.12);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.3);
      o.start(ctx.currentTime+i*0.12);o.stop(ctx.currentTime+i*0.12+0.3);
    });
  }catch(e){}
}
function playAlarm(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.35,0.7].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(0.4,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.3);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.3);
    });
  }catch(e){}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(window._toastT);
  window._toastT=setTimeout(()=>t.style.display='none',2200);
}

function formatDate(d){
  const days=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const months=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  return days[d.getDay()]+', '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
}
function formatDateShort(d){
  const days=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const months=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  return days[d.getDay()]+', '+d.getDate()+' '+months[d.getMonth()];
}
